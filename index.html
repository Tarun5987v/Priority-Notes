<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call App</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

    <!-- Overlay -->
    <div class="overlay"></div>

    <div class="container">

        <!-- Left Buttons -->
        <div class="controls">

            <button class="icon-btn add-btn">
                <i class="fa-solid fa-plus"></i>
            </button>

            <button class="icon-btn prev-btn">
                <i class="fa-solid fa-arrow-up"></i>
            </button>

            <button class="icon-btn next-btn">
                <i class="fa-solid fa-arrow-down"></i>
            </button>

        </div>

        <!-- Cards Container -->
        <div class="cards-wrapper">
            <!-- Cards will be inserted here -->
        </div>

        <!-- Color Dots -->
        <div class="colors">

            <span class="dot emergency"></span>
            <span class="dot important"></span>
            <span class="dot urgent"></span>
            <span class="dot norush"></span>

        </div>

    </div>

    <!-- Hidden Form -->

    <div class="form-box">

        <h2>New Call</h2>

        <form>

            <input class="img" required type="text" placeholder="Image URL">

            <input class="name" required type="text" placeholder="Full Name">

            <input class="town" required type="text" placeholder="Home Town">

            <input class="purpose" required type="text" placeholder="Purpose">

            <div class="radio-group" required>

                <label>
                    <input type="radio" name="category" value="Emergency">
                    Emergency
                </label>

                <label>
                    <input type="radio" name="category" value="Important">
                    Important
                </label>

                <label>
                    <input type="radio" name="category" value="Urgent">
                    Urgent
                </label>

                <label>
                    <input type="radio" name="category" value="No Rush">
                    No Rush
                </label>

            </div>

            <button class="create-btn" type="submit">
                Create Note
            </button>

        </form>

        <button class="close-btn">
            Close
        </button>

    </div>
<script src="script.js"></script>
</body>
</html>
